name: Compatibility Tests
on:
  schedule:
    - cron: '0 3 * * *'
  push:
    branches:
      - master
  pull_request:
    types: [ opened, synchronize, reopened, labeled ]
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'compatibility-sensitive')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        hazelcast: [ '5.3.7', '5.4.0', '5.5.0-SNAPSHOT' ]
        # Versions marked latest stable and limited-support from https://hibernate.org/orm/releases/
        hibernate: [
          '5.3.36.Final',
          '5.6.15.Final',
          '6.2.25.Final',
          '6.4.8.Final',
          '6.5.2.Final'
        ]
    name: Test against HZ ${{ matrix.hazelcast }} and HN ${{ matrix.hibernate }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
          cache: 'maven'

      - uses: hazelcast/docker-actions/setup-maven-snapshot-internal@master
        with:
          aws-role-to-assume: ${{ vars.AWS_HAZELCAST_OIDC_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Compile with default Hazelcast and Hibernate
        run: |
          ./mvnw \
            compile \
            --batch-mode 

      - name: Run tests against HZ ${{ matrix.hazelcast }} and HN ${{ matrix.hibernate }}
        run: |
          ./mvnw \
            verify \
            --batch-mode \
            -Dhazelcast.version=${{ matrix.hazelcast }} \
            -Dhibernate.core.version=${{ matrix.hibernate }} \
            -Dmaven.main.skip=true

  test-jdks:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'compatibility-sensitive')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Run with latest Hazelcast release
        hazelcast: [ '5.4.0' ]
        java: [ '17', '21' ]
        jakarta: [ '3.2.0' ]
        include:
          # And the 5.3.z release still supports Java 11
          - hazelcast: '5.3.7'
            java: '11'
            jakarta: '3.1.0'
    name: Test against JDK ${{ matrix.java }} and HZ ${{ matrix.hazelcast }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile with JDK 17
        run: |
          ./mvnw \
            compile \
            --batch-mode 

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests against JDK ${{ matrix.java }} and HZ ${{ matrix.hazelcast }}
        run: |
          JAVA_HOME=${JAVA_HOME_${{ matrix.java }}_x64} ./mvnw \
            verify
            --batch-mode \
            -Dhazelcast.version=${{ matrix.hazelcast }} \
            -Djakarta.version=${{ matrix.jakarta }} \
            -Dmaven.main.skip=true
